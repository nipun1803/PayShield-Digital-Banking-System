name: Integration Tests

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  run-integration-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        run: npm ci
        working-directory: ./src/client

      - name: Run Frontend Integration Tests (Vitest & MSW)
        run: npm run test:integration | tee integration-test.log
        working-directory: ./src/client
        env:
          CI: true

      - name: Upload Integration Test Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-artifact
          path: src/client/integration-test.log
          retention-days: 60
          overwrite: true
